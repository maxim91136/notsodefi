name: "BCH: Fetch Network Data"

on:
  schedule:
    - cron: '50 5 * * *'  # Daily at 5:50 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch BCH data
        run: npx tsx scripts/fetch-bch.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/bitcoincash.json || (
            git add data/bitcoincash.json
            git commit -m "chore(data): BCH - update network metrics"
            git push
          )
