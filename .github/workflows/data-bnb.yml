name: "BNB: Fetch Network Data"

on:
  schedule:
    - cron: '0 5 * * *'  # Daily at 5:00 UTC (30 min after XRP)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch BNB data
        run: npx tsx scripts/fetch-bnb.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/bnb.json || (
            git add data/bnb.json
            git commit -m "chore(data): BNB - update network metrics"
            git push
          )
