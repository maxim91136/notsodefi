name: "Data: Fetch Decentralization Metrics"

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 UTC
  workflow_dispatch:
    inputs:
      chain:
        description: 'Select chain to update'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - btc
          - sol
          - eth
      full:
        description: 'Include sampling (40+ API calls per chain)'
        required: false
        default: false
        type: boolean

jobs:
  # ===========================================================================
  # BTC - Bitcoin (Proof of Work)
  # ===========================================================================
  btc:
    runs-on: ubuntu-latest
    if: ${{ inputs.chain == 'btc' || inputs.chain == 'all' || github.event_name == 'schedule' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch Bitcoin data
        run: npx tsx scripts/fetch-btc.ts ${{ inputs.full && '--full' || '' }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/bitcoin.json || (
            git add data/bitcoin.json
            git commit -m "chore(data): BTC - update network metrics"
            git push
          )

  # ===========================================================================
  # SOL - Solana (Proof of Stake)
  # ===========================================================================
  sol:
    runs-on: ubuntu-latest
    if: ${{ inputs.chain == 'sol' || inputs.chain == 'all' || github.event_name == 'schedule' }}
    needs: btc  # Run sequentially to avoid git conflicts

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Get latest after BTC push
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch Solana data
        run: |
          if [ -f scripts/fetch-sol.ts ]; then
            npx tsx scripts/fetch-sol.ts
          else
            echo "Solana fetcher not yet implemented"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/solana.json 2>/dev/null || (
            git add data/solana.json
            git commit -m "chore(data): SOL - update network metrics"
            git push
          ) || true

  # ===========================================================================
  # ETH - Ethereum (Proof of Stake)
  # ===========================================================================
  eth:
    runs-on: ubuntu-latest
    if: ${{ inputs.chain == 'eth' || inputs.chain == 'all' || github.event_name == 'schedule' }}
    needs: sol  # Run sequentially

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch Ethereum data
        run: |
          if [ -f scripts/fetch-eth.ts ]; then
            npx tsx scripts/fetch-eth.ts
          else
            echo "Ethereum fetcher not yet implemented"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/ethereum.json 2>/dev/null || (
            git add data/ethereum.json
            git commit -m "chore(data): ETH - update network metrics"
            git push
          ) || true
