name: Fetch Network Data

on:
  # Daily at 6:00 UTC
  schedule:
    - cron: '0 6 * * *'
  # Manual trigger
  workflow_dispatch:
    inputs:
      chain:
        description: 'Chain to fetch (btc, all)'
        required: false
        default: 'all'
      full:
        description: 'Run full fetch with sampling'
        required: false
        default: 'false'

jobs:
  fetch-btc:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.chain == 'btc' || github.event.inputs.chain == 'all' || github.event_name == 'schedule' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Bitcoin data
        run: |
          if [ "${{ github.event.inputs.full }}" = "true" ]; then
            npx tsx scripts/fetch-btc.ts --full
          else
            npx tsx scripts/fetch-btc.ts
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/; then
            echo "No changes to commit"
          else
            git add data/
            git commit -m "chore: update Bitcoin network data

            Automated data fetch via GitHub Actions

            🤖 Generated with [Claude Code](https://claude.com/claude-code)"
            git push
          fi
