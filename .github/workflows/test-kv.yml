name: Test Cloudflare KV

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test KV Write
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_ID: ${{ secrets.CF_KV_ID }}
        run: |
          echo "Testing Cloudflare KV connection..."

          # Check if secrets are set
          if [ -z "$CF_ACCOUNT_ID" ]; then echo "❌ CF_ACCOUNT_ID not set"; exit 1; fi
          if [ -z "$CF_API_TOKEN" ]; then echo "❌ CF_API_TOKEN not set"; exit 1; fi
          if [ -z "$CF_KV_ID" ]; then echo "❌ CF_KV_ID not set"; exit 1; fi

          echo "✅ All secrets are set"

          # Test write
          TEST_DATA='{"test": true, "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}'

          HTTP_STATUS=$(curl -s -o /tmp/kv_response.json -w "%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_ID}/values/_test" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$TEST_DATA")

          echo "Write response (HTTP $HTTP_STATUS):"
          cat /tmp/kv_response.json
          echo ""

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ KV Write successful"
          else
            echo "❌ KV Write failed"
            exit 1
          fi

          # Test read
          HTTP_STATUS=$(curl -s -o /tmp/kv_read.json -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_ID}/values/_test" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")

          echo "Read response (HTTP $HTTP_STATUS):"
          cat /tmp/kv_read.json
          echo ""

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ KV Read successful"
          else
            echo "❌ KV Read failed"
            exit 1
          fi

          echo ""
          echo "🎉 All tests passed!"
