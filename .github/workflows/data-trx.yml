name: "TRX: Fetch Network Data"

on:
  schedule:
    - cron: '30 7 * * *'  # Daily at 7:30 UTC (30 min after AVAX)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch TRX data
        run: npx tsx scripts/fetch-trx.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/trx.json || (
            git add data/trx.json
            git commit -m "chore(data): TRX - update network metrics"
            git push
          )
