name: "NEAR: Fetch Network Data"

on:
  schedule:
    - cron: '30 6 * * *'  # Daily at 6:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch NEAR data
        run: npx tsx scripts/fetch-near.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/near.json || (
            git add data/near.json
            git commit -m "chore(data): NEAR - update network metrics"
            git push
          )
