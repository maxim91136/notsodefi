name: "USDC: Fetch Supply Data"

on:
  schedule:
    # Run daily at 14:30 UTC
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch USDC data
        run: npx tsx scripts/fetch-usdc.ts

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/usdc.json
          git diff --staged --quiet || git commit -m "chore(data): USDC - update supply metrics"
          git push
