name: "TAO: Fetch Network Data"

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 UTC (30 min after ZEC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch TAO data
        env:
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
        run: npx tsx scripts/fetch-tao.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/tao.json || (
            git add data/tao.json
            git commit -m "chore(data): TAO - update network metrics"
            git push
          )
