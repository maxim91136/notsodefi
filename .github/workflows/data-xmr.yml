name: "XMR: Fetch Network Data"

on:
  schedule:
    - cron: '40 5 * * *'  # Daily at 5:40 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch XMR data
        run: npx tsx scripts/fetch-xmr.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/monero.json || (
            git add data/monero.json
            git commit -m "chore(data): XMR - update network metrics"
            git push
          )
