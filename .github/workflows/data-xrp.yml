name: "XRP: Fetch Network Data"

on:
  schedule:
    - cron: '30 4 * * *'  # Daily at 4:30 UTC (30 min after ETH)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch XRP data
        run: npx tsx scripts/fetch-xrp.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/xrp.json || (
            git add data/xrp.json
            git commit -m "chore(data): XRP - update network metrics"
            git push
          )
