name: "ZEC: Fetch Network Data"

on:
  schedule:
    - cron: '30 5 * * *'  # Daily at 5:30 UTC (30 min after BNB)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch ZEC data
        run: npx tsx scripts/fetch-zec.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/zec.json || (
            git add data/zec.json
            git commit -m "chore(data): ZEC - update network metrics"
            git push
          )
