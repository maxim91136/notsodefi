name: "BTC: Fetch Network Data"

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 UTC
  workflow_dispatch:
    inputs:
      full:
        description: 'Include cloud sampling (40+ API calls)'
        required: false
        default: false
        type: boolean

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch Bitcoin data
        run: npx tsx scripts/fetch-btc.ts ${{ inputs.full && '--full' || '' }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/bitcoin.json || (
            git add data/bitcoin.json
            git commit -m "chore(data): BTC - update network metrics"
            git push
          )
