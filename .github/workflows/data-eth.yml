name: "ETH: Fetch Network Data"

on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 7:00 UTC (1h after BTC, 30min after SOL)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Fetch Ethereum data
        run: npx tsx scripts/fetch-eth.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/ethereum.json || (
            git add data/ethereum.json
            git commit -m "chore(data): ETH - update network metrics"
            git push
          )
